<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Barbearia</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
<main class="login-container cadastro-container">
    <div class="logo">
        <h1>CADASTRO</h1>
        <p>Crie um usuario para acessar o sistema</p>
    </div>

    {#if mensagemErro}
        <div class="alert alert-error">{mensagemErro}</div>
    {/if}

    {#if mensagemSucesso}
        <div class="alert alert-success">{mensagemSucesso}</div>
    {/if}

    <div id="mensagemCadastro" class="alert hidden" role="status" aria-live="polite"></div>

    <form id="formCadastroUsuario" action="/usuarios/cadastro" method="post">
        <div class="input-group">
            <label for="nome">Nome</label>
            <input id="nome" name="nome" type="text" placeholder="Digite seu nome" autocomplete="name" required>
        </div>

        <div class="input-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="Digite seu email" autocomplete="email" required>
        </div>

        <div class="input-group">
            <label for="senha">Senha</label>
            <input id="senha" name="senha" type="password" placeholder="Digite uma senha" autocomplete="new-password" required>
        </div>

        <div class="input-group">
            <label for="confirmacaoSenha">Confirmar senha</label>
            <input id="confirmacaoSenha" name="confirmacaoSenha" type="password" placeholder="Repita a senha" autocomplete="new-password" required>
        </div>

        <button class="btn-login" type="submit" onclick="cadastrarUsuario()">Cadastrar</button>

        <div class="extra">
            <p>Ja tem usuario? <a href="/login">Voltar para login</a></p>
        </div>
    </form>
</main>
<script src="/js/cadastro.js"></script>
</body>
</html>
