<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Prime | Agendamento</title>
    <link rel="stylesheet" href="css/styleIndex.css">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/index" aria-label="Barbearia Prime">
        <span class="brand-mark">BP</span>
        <span>
        <strong>Barbearia Prime</strong>
        <small>agenda online</small>
      </span>
    </a>

    <nav class="nav" aria-label="Navegação principal">
        <a href="#servicos">Serviços</a>
        <a href="#barbeiros">Barbeiros</a>
        <a href="/usuarios/cadastro">Agendar</a>
        <a href="/login">Realizar Login</a>
    </nav>
</header>

<section class="workspace" id="agenda" aria-labelledby="booking-title">
    <form class="booking-panel" id="bookingForm">
        <div class="section-heading compact">
            <p class="eyebrow">Novo horário</p>
            <h2 id="booking-title">Agendar atendimento</h2>
        </div>

        {!<label>!}
            {!Nome do cliente!}
            {!<input type="text" id="clientName" placeholder="Ex.: João Silva" autocomplete="name" required>!}
        {!</label>!}

        {!<label>!}
            {!Telefone!}
            {!<input type="tel" id="clientPhone" placeholder="(00) 00000-0000" autocomplete="tel" required>!}
        {!</label>!}

        <label>
            Serviço
            <select id="serviceSelect" required></select>
        </label>

        <label>
            Barbeiro
            <select id="barberSelect" required></select>
        </label>

        <div class="form-row">
            <label>
                Data
                <input type="date" id="bookingDate" required>
            </label>

            <label>
                Horário
                <select id="bookingTime" required></select>
            </label>
        </div>

        <label>
            Observações
            <textarea id="bookingNotes" rows="2" placeholder="Preferência..."></textarea>
        </label>

        <button class="button primary submit" type="submit">Confirmar agendamento</button>
    </form>

    {!<aside class="schedule-panel" id="painel" aria-labelledby="schedule-title">!}
        {!<div class="schedule-header">!}
            {!<div>!}
                {!<p class="eyebrow">Painel</p>!}
                {!<h2 id="schedule-title">Agenda do dia</h2>!}
            {!</div>!}
            {!<button class="icon-button" id="clearSchedule" type="button" title="Limpar agenda" aria-label="Limpar agenda">!}
                {!×!}
            {!</button>!}
        {!</div>!}
{!!}
        {!<div class="stats">!}
            {!<div>!}
                {!<strong id="totalAppointments">0</strong>!}
                {!<span>horários</span>!}
            {!</div>!}
            {!<div>!}
                {!<strong id="dayRevenue">R$ 0</strong>!}
                {!<span>previsto</span>!}
            {!</div>!}
        {!</div>!}
{!!}
        {!<div class="appointment-list" id="appointmentList"></div>!}
    {!</aside>!}
</section>
<script src="js/app.js"></script>
</body>
</html>
