<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia D+ | Agendamento</title>
    <link rel="stylesheet" href="css/styleIndex.css">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/" aria-label="Barbearia D+">
        <span class="brand-mark">BP</span>
        <span>
        <strong>Barbearia D+</strong>
        <small>agenda online</small>
      </span>
    </a>

    <nav class="nav" aria-label="Navegação principal">
        <a href="/">Home</a>
        <a href="/agendamentoUser">Agendar</a>
        <a onclick="logout()">Deslogar</a>
    </nav>
</header>

<section class="workspace" id="agenda" aria-labelledby="booking-title">
    <form class="booking-panel" id="bookingForm">
        <div class="section-heading compact">
            <p class="eyebrow">Novo horário</p>
            <h2 id="booking-title">Agendar atendimento</h2>
            <div id="usuarioLogadoNome" style="margin-top: 8px; font-size: 15px; font-weight: bold; color: var(--accent);"></div>
        </div>
        <div id="mensagemCadastro" class="hidden"></div>
        {!<label>!}
            {!Nome do cliente!}
            {!<input type="text" id="clientName" placeholder="Ex.: João Silva" autocomplete="name" required>!}
        {!</label>!}

        {!<label>!}
            {!Telefone!}
            {!<input type="tel" id="clientPhone" placeholder="(00) 00000-0000" autocomplete="tel" required>!}
        {!</label>!}

        <label>
            Serviço
            <select id="serviceSelect" required></select>
        </label>

        <label>
            Barbeiro
            <select id="barberSelect" required></select>
        </label>

        <div class="form-row">
            <label>
                Data
                <input type="date" id="bookingDate" required>
            </label>

            <label>
                Horário
                <select id="bookingTime" required></select>
            </label>
        </div>

        <label>
            Observações
            <textarea id="bookingNotes" rows="2" placeholder="Preferência..."></textarea>
        </label>

        <button class="button primary submit" onclick="cadastrarAgendamento()">Confirmar agendamento</button>
    </form>

    <aside class="schedule-panel" id="painel" aria-labelledby="schedule-title" style="padding: clamp(18px, 3vw, 28px);">
        <div class="schedule-header" style="margin-bottom: 20px;">
            <p class="eyebrow">Histórico</p>
            <h2 id="schedule-title" style="font-family: Georgia, serif; color: var(--brand); margin: 4px 0 0 0; font-size: 24px;">Meus Agendamentos</h2>
        </div>
        
        <div class="appointment-list" id="meusAgendamentosList">
            <div style="text-align: center; color: var(--muted); padding: 20px;">Carregando agendamentos...</div>
        </div>
    </aside>
</section>
<script src="/js/menu.js"></script>
<script src="js/app.js"></script>
<script src="js/agendamento.js"></script>
</body>
</html>
