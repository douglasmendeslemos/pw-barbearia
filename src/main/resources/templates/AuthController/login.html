<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia</title>
    <link rel="stylesheet" href="/css/styleIndex.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
<header class="topbar">
    <a class="brand" href="/" aria-label="Barbearia D+">
        <span class="brand-mark">BP</span>
        <span>
        <strong>Barbearia D+</strong>
        <small>agenda online</small>
      </span>
    </a>

    <nav class="nav" aria-label="Navegação principal">
    </nav>
</header>

<main class="login-container">
    <div class="logo">
        <h1>BARBEARIA</h1>
        <p>Sistema da Barbearia D+</p>
    </div>

    <form>
        <div class="input-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Digite seu email" autocomplete="email">
        </div>
        <div class="input-group">
            <label for="senha">Senha</label>
            <input id="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password">
        </div>

        <button class="btn-login" type="button" onclick="fazerLogin()">
            Entrar
        </button>

        <div class="extra">
            <p>Novo no sistema? <a href="/usuarios/cadastro">Criar usuario</a></p>
        </div>
    </form>
</main>
<script src="/js/login.js"></script>
</body>
</html>
