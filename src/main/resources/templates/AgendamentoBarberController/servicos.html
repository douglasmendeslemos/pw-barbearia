<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Barbearia</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/styleIndex.css">
</head>
<body class="login-page">

<header class="topbar">
    <a class="brand" href="/" aria-label="Barbearia D+">
        <span class="brand-mark">BP</span>
        <span>
        <strong>Barbearia D+</strong>
        <small>agenda online</small>
      </span>
    </a>

    <nav class="nav" aria-label="Navegação principal">
        <a href="#servicos">Serviços</a>
        <a href="#barbeiros">Barbeiros</a>
        <a href="/usuarios/cadastro">Agendar</a>
        <a href="/login">Realizar Login</a>
    </nav>
</header>

<main class="login-container cadastro-container">
    <div class="logo">
        <h1>SERVIÇO</h1>
        <p>Crie um serviço da Barbearia</p>
    </div>

    <div id="mensagemCadastro" class="alert hidden" role="status" aria-live="polite"></div>

    <form id="formCadastroServico" action="/servicos/api" method="post">
        <div class="input-group">
            <label for="nome">Nome Servico:</label>
            <input id="nome" name="nome" type="text" placeholder="Digite o nome do serviço" required>
        </div>

        <div class="input-group">
            <label for="tempo">Tempo de serviço</label>
            <input id="tempo" name="tempo" type="minutos" placeholder="Informe o tempo de serviço" required>
        </div>

        <div class="input-group">
            <label for="descricao">Descrição:</label>
            <input id="descricao" name="descricao" type="descricao" placeholder="Informe breve descricao" required>
        </div>

        <div class="input-group">
            <label for="valorServico">Preço</label>
            <input id="valor" name="valorServico" type="valor" placeholder="R$" required>
        </div>

        <button class="btn-login" type="submit" onclick="cadastrarServico()">Cadastrar</button>

        <div class="extra">
            <p>Ja tem usuario? <a href="/login">Voltar para login</a></p>
        </div>
    </form>
</main>
<script src="/js/menu.js"></script>
<script src="/js/cadastro.js"></script>
</body>
</html>
